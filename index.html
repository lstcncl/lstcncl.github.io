<!DOCTYPE html>
<html>
<head>
  <title>High Level Project - Viewer Discretion is adviced </title>
</head>

<body onclick="startMadness()" style="margin:0; background:black; cursor:pointer; overflow:hidden;">

<h1 id="text" style="
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  color:white;
  font-size:40px;
  z-index:10;
">
click to start motivational videos
</h1>

<video id="bg" autoplay muted loop playsinline
  style="width:100%; height:100vh; object-fit:cover;">
  <source src="video.mp4" type="video/mp4">
</video>

<script>
let started = false;

function startMadness() {
  if (started) return;
  started = true;

  document.getElementById("text").innerHTML = "KYU NAHI HO RAHI PADHAI 💀";

  const video = document.getElementById("bg");
  video.muted = false;

  // AUDIO CONTEXT (for distortion)
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  function playDistorted(delay, gainValue, distortionLevel, playbackRate) {
    fetch("padhai.mp3")
      .then(res => res.arrayBuffer())
      .then(data => ctx.decodeAudioData(data))
      .then(buffer => {
        const source = ctx.createBufferSource();
        source.buffer = buffer;

        // SPEED CHANGE (pitch effect)
        source.playbackRate.value = playbackRate;

        const gain = ctx.createGain();
        gain.gain.value = gainValue;

        const distortion = ctx.createWaveShaper();
        distortion.curve = makeDistortionCurve(distortionLevel);
        distortion.oversample = "4x";

        // CONNECT: source → distortion → gain → output
        source.connect(distortion);
        distortion.connect(gain);
        gain.connect(ctx.destination);

        source.start(ctx.currentTime + delay);
      });
  }

  // distortion curve generator
  function makeDistortionCurve(amount) {
    let k = typeof amount === 'number' ? amount : 50,
        n_samples = 44100,
        curve = new Float32Array(n_samples),
        deg = Math.PI / 180;

    for (let i = 0; i < n_samples; ++i) {
      let x = i * 2 / n_samples - 1;
      curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
    }
    return curve;
  }

  // 🔊 INITIAL ECHO BURST
  playDistorted(0,   1, 400, 1);    // normal distorted
  playDistorted(0.3, 1, 800, 0.8);  // deeper
  playDistorted(0.6, 1, 1000, 1.2); // high pitch
  playDistorted(0.9, 1, 600, 0.6);  // slow creepy

  // 💀 CONTINUOUS CHAOS LOOP
  setInterval(() => {
    let rate = 0.5 + Math.random() * 1.5;   // random pitch
    let dist = 300 + Math.random() * 1200;  // random distortion
    playDistorted(0, 1, dist, rate);
  }, 1200);

  // 🔥 FLASHING BACKGROUND
  setInterval(() => {
    document.body.style.background =
      document.body.style.background === "black" ? "red" : "black";
  }, 200);
}
</script>

</body>
</html>
