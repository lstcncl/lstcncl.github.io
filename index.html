<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Motivation Portal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container" id="loadingScreen">
  <h2>Checking your मेहनत level... 😈</h2>
</div>

<div class="container hidden" id="loginPage">
<h2>Login First 😈</h2>
<input id="username" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<input placeholder="How are you feeling?"><br>
<select>
<option>Watch your parents working hard</option>
<option>Do hardwork once and stop forever</option>
</select><br>
<p class="captcha">JabhaIskript</p>
<input id="captcha" placeholder="Enter captcha"><br>
<button onclick="login()">Login</button>
</div>

<div class="container hidden" id="passcodePage">
<h2>Enter Passcode 😈</h2>
<p class="troll">Hint: must include 1234 (but only 4 digits allowed 😂)</p>
<input id="passcode" maxlength="4" placeholder="4 digit passcode">
<button onclick="checkPasscode()">Submit</button>
</div>

<div class="container hidden" id="dashboard">
<h2 id="welcome"></h2>
<p id="coinText"></p>

<button onclick="showQuotes()">Motivational Quotes</button>
<button onclick="showVideos()">Motivational Videos</button>
<button onclick="physicsHelp()">How to pass physics exam</button>
<button onclick="girlfriend()">What is girlfriend?</button>

<div id="quotesSection" class="hidden">
<div class="card" id="quoteCard"></div>
<button onclick="nextQuote()">Next</button>
</div>

<div id="videoSection" class="hidden">
<iframe width="300" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<h3>Premium 🔒</h3>
<ul>
<li onclick="premium()">Chat with Trumpa</li>
<li onclick="premium()">Chat with PutinJi</li>
<li onclick="premium()">Instagram Scrollogy</li>
<li onclick="premium()">Hire Me</li>
</ul>
</div>

<script>
let quotes = [
"keh do na palas 2 ~ anonymous chemistry professor",
"my mom is kinda homeless ~ ishowspeed",
"kyu nahi ho rahi padhai ~ alakh sir",
"one chai please ~ bill gates",
"Jabhaa Iskript ~ codewithbangla",
"corruption is bad if I am not involved in it",
"putin said i am a genius ~ trumpa"
];

let audios = [
"audio1.mp3",
"audio2.mp3",
"audio3.mp3",
"audio4.mp3",
"audio5.mp3",
"audio6.mp3",
"audio7.mp3"
];

let index = 0;
let coins = 23;

// fake loading
setTimeout(()=>{
 document.getElementById("loadingScreen").classList.add("hidden");
 document.getElementById("loginPage").classList.remove("hidden");
},2000);

function login(){
let user = document.getElementById("username").value;
let captcha = document.getElementById("captcha").value;

if(captcha !== "JabhaIskript"){
alert("System detected laziness 😡");
return;
}

alert("Verifying productivity...");

window.username = user;
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("passcodePage").classList.remove("hidden");
}

function checkPasscode(){
let pass = document.getElementById("passcode").value;

if(pass.length !== 4 || !pass.includes("1234")){
alert("Impossible condition 😂 Try again");
return;
}

coins = Math.floor(Math.random()*80);

document.getElementById("passcodePage").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("welcome").innerText = "Good day " + window.username + "! Enjoy and rate features";
document.getElementById("coinText").innerText = "Coins: " + coins + "/80";
}

function showQuotes(){
document.getElementById("quotesSection").classList.remove("hidden");
showQuote();
}

function showQuote(){
document.getElementById("quoteCard").innerText = quotes[index];
let audio = new Audio(audios[index]);
audio.play();
}

function nextQuote(){
index = (index + 1) % quotes.length;
showQuote();
}

function showVideos(){
document.getElementById("videoSection").classList.remove("hidden");
alert("Only one video is enough for your motivation 😤");
}

function physicsHelp(){
alert("Step 1: Open book\nStep 2: Cry\nStep 3: Repeat 😭");
}

function girlfriend(){
alert("Error 404: Not found in your life 💀");
}

function premium(){
if(coins >= 80){
alert("Welcome to premium 😎");
}else{
alert("Earn more coins bro 🪙");
}
}
</script>

</body>
</html>
