<!DOCTYPE html>
<html>
<head>
  <title>high level project #1 (viewer discretion is adviced)</title>
</head>

<body onclick="startMadness()" style="
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  cursor:pointer;
">

<h1 id="text" style="
  position:absolute;
  color:white;
  font-size:40px;
">
click to view (keep full volume)
</h1>

<video id="vid" loop playsinline style="
  display:none;
  width:60%;
  max-width:600px;
  border:5px solid white;
  border-radius:10px;
">
  <source src="video.mp4" type="video/mp4">
</video>

<script>
let started = false;

function startMadness() {
  if (started) return;
  started = true;

  // remove text
  document.getElementById("text").style.display = "none";

  // show video
  const video = document.getElementById("vid");
  video.style.display = "block";
  video.muted = false;
  video.play();

  // 🔊 CLEAN REPEATING AUDIO (no distortion)
  setInterval(() => {
    let a = new Audio("padhai.mp3");
    a.volume = 1;
    a.play();
  }, 1000); // every 1 sec

  // 🚨 RED BLUE FLASH
  let colors = ["red", "blue"];
  let i = 0;

  setInterval(() => {
    document.body.style.background = colors[i % 2];
    i++;
  }, 300);
}
</script>

</body>
</html>
